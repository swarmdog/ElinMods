name: Package Elin Mods

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: [self-hosted, Windows, elin]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Package mods
        shell: powershell
        run: ./tools/package-mods.ps1 -Configuration Release -OutputDir artifacts/packages

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: elin-mod-packages
          path: artifacts/packages/*.zip
          if-no-files-found: error

      - name: Attach packages to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/packages/*.zip
